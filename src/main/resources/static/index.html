<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Admin Dashboard</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family: Arial;
    background:#0d0d0d;
    color:white;
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:240px;
    background:#151515;
    padding:25px;
}

.logo{
    font-size:24px;
    font-weight:bold;
    margin-bottom:40px;
}

.menu button{
    display:block;
    width:100%;
    margin-bottom:10px;
    padding:12px;
    background:#1e1e1e;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.main{flex:1;padding:25px;}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#111;
    color:white;
    border:1px solid #333;
}

button{cursor:pointer;}

.card{
    background:#111;
    padding:15px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">Admin Panel</div>
    <button onclick="getEmployees()">Employees</button>
    <button onclick="toggleAdd()">Add Employee</button>
</div>

<div class="main">

<h2>Employee Dashboard</h2>

<h3>Total: <span id="totalEmployees">0</span></h3>

<!-- LOGIN -->
<div>
    <h3>Login</h3>
    <input id="username" placeholder="username">
    <input id="password" type="password" placeholder="password">
    <button onclick="login()">Login</button>
</div>

<!-- ADD -->
<div id="addBox" style="display:none;">
    <h3>Add Employee</h3>
    <input id="empName" placeholder="name">
    <input id="empAge" placeholder="age">
    <button onclick="addEmployee()">Save</button>
</div>

<!-- LIST -->
<div id="output"></div>

</div>

<script>

const BASE_URL = "https://employee-management-system-zmmr.onrender.com";

let token = "";
let role = "";

/* LOGIN */
function login() {

fetch(`${BASE_URL}/auth/login`, {
    method: "POST",
    headers: {"Content-Type":"application/x-www-form-urlencoded"},
    body: new URLSearchParams({
        username: username.value,
        password: password.value
    })
})
.then(res => res.json())
.then(data => {

    if(data.error){
        alert("Login failed");
        return;
    }

    token = data.token;
    role = data.role;   // ✅ FIXED

    localStorage.setItem("token", token);
    localStorage.setItem("role", role);

    applyRoleUI();  // ✅ FIXED

    alert("Login success");
    getEmployees();
});

}

/* ROLE UI */
function applyRoleUI(){

    if(role === "ADMIN"){
        document.getElementById("addBox").style.display = "block";
    } else {
        document.getElementById("addBox").style.display = "none";
    }
}

/* GET */
function getEmployees(){

fetch(`${BASE_URL}/employee`, {
    headers:{
        "Authorization":"Bearer " + token
    }
})
.then(res => res.json())
.then(data => {

    totalEmployees.innerText = data.length;

    let html = "";

    data.forEach(e => {
        html += `
        <div class="card">
            <div>
                <b>${e.name}</b><br>
                Age: ${e.age}
            </div>
            <div>
                <button onclick="deleteEmployee(${e.id})">Delete</button>
                <button onclick="updateEmployee(${e.id})">Update</button>
            </div>
        </div>`;
    });

    output.innerHTML = html;

});

}

/* ADD */
function addEmployee(){

fetch(`${BASE_URL}/employee`, {
    method:"POST",
    headers:{
        "Authorization":"Bearer " + token,
        "Content-Type":"application/json"
    },
    body: JSON.stringify({
        name: empName.value,
        age: empAge.value
    })
})
.then(() => {
    alert("Added");
    getEmployees();
});

}

/* DELETE */
function deleteEmployee(id){

fetch(`${BASE_URL}/employee/${id}`, {
    method:"DELETE",
    headers:{
        "Authorization":"Bearer " + token
    }
})
.then(() => getEmployees());

}

/* UPDATE */
function updateEmployee(id){

let name = prompt("name");
let age = prompt("age");

fetch(`${BASE_URL}/employee/${id}`, {
    method:"PUT",
    headers:{
        "Authorization":"Bearer " + token,
        "Content-Type":"application/json"
    },
    body: JSON.stringify({name, age})
})
.then(() => getEmployees());

}

function toggleAdd(){
    addBox.style.display = addBox.style.display === "none" ? "block" : "none";
}

</script>

</body>
</html>
