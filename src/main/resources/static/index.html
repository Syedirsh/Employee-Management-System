<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Admin Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#0d0d0d;
    color:white;
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:240px;
    background:#151515;
    padding:25px;
    border-right:1px solid #2a2a2a;
}

.logo{
    font-size:24px;
    font-weight:bold;
    margin-bottom:40px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.menu button{
    background:#1e1e1e;
    color:white;
    border:none;
    padding:14px;
    border-radius:10px;
    cursor:pointer;
    text-align:left;
    transition:0.2s;
}

.menu button:hover{
    background:#2b2b2b;
}

/* MAIN AREA */

.main{
    flex:1;
    padding:25px;
}

/* TOPBAR */

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.topbar h1{
    font-size:28px;
}

.user-box{
    background:#1c1c1c;
    padding:10px 16px;
    border-radius:10px;
}

/* STATS */

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-bottom:25px;
}

.stat-card{
    background:#171717;
    padding:20px;
    border-radius:16px;
    border:1px solid #2a2a2a;
}

.stat-card h3{
    color:#888;
    margin-bottom:10px;
}

.stat-card h2{
    font-size:30px;
}

/* LOGIN BOX */

.login-box{
    background:#171717;
    padding:20px;
    border-radius:16px;
    margin-bottom:25px;
    border:1px solid #2a2a2a;
}

/* INPUTS */

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#0f0f0f;
    border:1px solid #2a2a2a;
    border-radius:10px;
    color:white;
}

/* BUTTONS */

button{
    cursor:pointer;
    font-weight:bold;
}

.btn{
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
}

.btn-white{
    background:white;
    color:black;
}

.btn-dark{
    background:#222;
    color:white;
    border:1px solid #333;
}

.btn-dark:hover{
    background:#2f2f2f;
}

/* ADD BOX */

.add-box{
    background:#171717;
    padding:20px;
    border-radius:16px;
    margin-bottom:25px;
    border:1px solid #2a2a2a;
}

/* EMPLOYEE LIST */

.employee-section{
    background:#171717;
    padding:20px;
    border-radius:16px;
    border:1px solid #2a2a2a;
}

.employee-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.employee-list{
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* CARD */

.card{
    background:#101010;
    padding:18px;
    border-radius:14px;
    border:1px solid #262626;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.card-left h3{
    margin-bottom:6px;
}

.card-left p{
    color:#9d9d9d;
}

/* CARD BUTTONS */

.card-buttons{
    display:flex;
    gap:10px;
}

.delete-btn{
    background:#2b1b1b;
    color:#ff6b6b;
    border:none;
    padding:10px 14px;
    border-radius:8px;
}

.update-btn{
    background:#1b2330;
    color:#6ea8ff;
    border:none;
    padding:10px 14px;
    border-radius:8px;
}

.delete-btn:hover{
    background:#402020;
}

.update-btn:hover{
    background:#253247;
}

/* MOBILE */

@media(max-width:900px){

    body{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        border-right:none;
        border-bottom:1px solid #2a2a2a;
    }

    .stats{
        grid-template-columns:1fr;
    }

    .card{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
    }
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">Admin Panel</div>

    <div class="menu">
        <button>Dashboard</button>
        <button onclick="getEmployees()">Employees</button>
        <button onclick="toggleAdd()">Add Employee</button>
    </div>

</div>

<!-- MAIN -->

<div class="main">

    <!-- TOPBAR -->

    <div class="topbar">
        <h1>Employee Dashboard</h1>

        <div class="user-box">
            Admin
        </div>
    </div>

    <!-- STATS -->

    <div class="stats">

        <div class="stat-card">
            <h3>Total Employees</h3>
            <h2 id="totalEmployees">0</h2>
        </div>

        <div class="stat-card">
            <h3>Backend</h3>
            <h2>Spring Boot</h2>
        </div>

        <div class="stat-card">
            <h3>Security</h3>
            <h2>JWT</h2>
        </div>

    </div>

    <!-- LOGIN -->

    <div class="login-box">

        <h2>Login</h2>

        <input id="username" placeholder="username">

        <input id="password" type="password" placeholder="password">

        <button class="btn btn-white" onclick="login()">
            Login
        </button>

    </div>

    <!-- ADD EMPLOYEE -->

    <div class="add-box" id="addBox" style="display:none;">

        <h2>Add Employee</h2>

        <input id="empName" placeholder="employee name">

        <input id="empAge" placeholder="employee age">

        <button class="btn btn-dark" onclick="addEmployee()">
            Save Employee
        </button>

    </div>

    <!-- EMPLOYEES -->

    <div class="employee-section">

        <div class="employee-header">

            <h2>Employee List</h2>

            <button class="btn btn-dark" onclick="getEmployees()">
                Refresh
            </button>

        </div>

        <div id="output" class="employee-list"></div>

    </div>

</div>

<script>

let token = "";

/* LOGIN */

function login(){

    fetch("http://localhost:8080/auth/login",{

        method:"POST",

        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },

        body:
            "username=" + document.getElementById("username").value +
            "&password=" + document.getElementById("password").value

    })

    .then(res => res.text())

    .then(data => {

        token = data;

        alert("Login successful");

        getEmployees();

    });

}

/* TOGGLE ADD */

function toggleAdd(){

    let box = document.getElementById("addBox");

    if(box.style.display === "none"){

        box.style.display = "block";

    }

    else{

        box.style.display = "none";
    }
}

/* ADD EMPLOYEE */

function addEmployee(){

    const dto = {

        name: document.getElementById("empName").value,

        age: document.getElementById("empAge").value
    };

    fetch("http://localhost:8080/employee",{

        method:"POST",

        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer " + token
        },

        body:JSON.stringify(dto)

    })

    .then(res => res.json())

    .then(() => {

        alert("Employee Added");

        getEmployees();

    });

}

/* GET EMPLOYEES */

function getEmployees(){

    fetch("http://localhost:8080/employee",{

        method:"GET",

        headers:{
            "Authorization":"Bearer " + token
        }

    })

    .then(res => res.json())

    .then(data => {

        document.getElementById("totalEmployees").innerText = data.length;

        let html = "";

        data.forEach(emp => {

            html += `
            
            <div class="card">

                <div class="card-left">

                    <h3>${emp.name}</h3>

                    <p>ID: ${emp.id}</p>

                    <p>Age: ${emp.age}</p>

                </div>

                <div class="card-buttons">

                    <button class="delete-btn"
                        onclick="deleteEmployee(${emp.id})">

                        Delete

                    </button>

                    <button class="update-btn"
                        onclick="updateEmployee(${emp.id})">

                        Update

                    </button>

                </div>

            </div>
            `;
        });

        document.getElementById("output").innerHTML = html;

    });

}

/* DELETE */

function deleteEmployee(id){

    fetch("http://localhost:8080/employee/" + id,{

        method:"DELETE",

        headers:{
            "Authorization":"Bearer " + token
        }

    })

    .then(res => res.text())

    .then(msg => {

        alert(msg);

        getEmployees();

    });

}

/* UPDATE */

function updateEmployee(id){

    let name = prompt("Enter new name:");

    let age = prompt("Enter new age:");

    const dto = {

        name:name,

        age:age
    };

    fetch("http://localhost:8080/employee/" + id,{

        method:"PUT",

        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer " + token
        },

        body:JSON.stringify(dto)

    })

    .then(res => res.json())

    .then(() => {

        alert("Employee Updated");

        getEmployees();

    });

}

</script>

</body>
</html>
