<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Admin Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#0d0d0d;
    color:white;
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:240px;
    background:#151515;
    padding:25px;
    border-right:1px solid #2a2a2a;
}

.logo{
    font-size:24px;
    font-weight:bold;
    margin-bottom:40px;
}

.menu{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.menu button{
    background:#1e1e1e;
    color:white;
    border:none;
    padding:14px;
    border-radius:10px;
    cursor:pointer;
}

.menu button:hover{
    background:#2b2b2b;
}

.main{
    flex:1;
    padding:25px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.user-box{
    background:#1c1c1c;
    padding:10px 16px;
    border-radius:10px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-bottom:25px;
}

.stat-card{
    background:#171717;
    padding:20px;
    border-radius:16px;
    border:1px solid #2a2a2a;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#0f0f0f;
    border:1px solid #2a2a2a;
    border-radius:10px;
    color:white;
}

button{
    cursor:pointer;
    font-weight:bold;
}

.btn{
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
}

.btn-white{
    background:white;
    color:black;
}

.btn-dark{
    background:#222;
    color:white;
}

.add-box, .login-box, .employee-section{
    background:#171717;
    padding:20px;
    border-radius:16px;
    margin-bottom:25px;
    border:1px solid #2a2a2a;
}

.employee-list{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.card{
    background:#101010;
    padding:18px;
    border-radius:14px;
    border:1px solid #262626;
    display:flex;
    justify-content:space-between;
}

.delete-btn{
    background:#2b1b1b;
    color:#ff6b6b;
    border:none;
    padding:10px;
    border-radius:8px;
}

.update-btn{
    background:#1b2330;
    color:#6ea8ff;
    border:none;
    padding:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">Admin Panel</div>

    <div class="menu">
        <button>Dashboard</button>
        <button onclick="getEmployees()">Employees</button>
        <button onclick="toggleAdd()">Add Employee</button>
    </div>
</div>

<div class="main">

    <div class="topbar">
        <h1>Employee Dashboard</h1>
        <div class="user-box" id="userBox">Guest</div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <h3>Total Employees</h3>
            <h2 id="totalEmployees">0</h2>
        </div>
    </div>

    <!-- LOGIN -->
    <div class="login-box">
        <h2>Login</h2>
        <input id="username" placeholder="username">
        <input id="password" type="password" placeholder="password">
        <button class="btn btn-white" onclick="login()">Login</button>
    </div>

    <!-- ADD -->
    <div class="add-box" id="addBox" style="display:none;">
        <h2>Add Employee</h2>
        <input id="empName" placeholder="employee name">
        <input id="empAge" placeholder="employee age">
        <button class="btn btn-dark" onclick="addEmployee()">Save</button>
    </div>

    <!-- LIST -->
    <div class="employee-section">
        <h2>Employee List</h2>
        <div id="output" class="employee-list"></div>
    </div>

</div>

<script>

const BASE_URL = "https://employee-management-system-zmmr.onrender.com";

let token = "";
let role = "";

/* LOGIN (FIXED) */
function login() {

    fetch(`${BASE_URL}/auth/login`, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.error) {
            alert("Login failed");
            return;
        }

        token = data.token;
        role = data.role;

        localStorage.setItem("token", token);
        localStorage.setItem("role", role);

        document.getElementById("userBox").innerText = role;

        applyRoleUI();
        getEmployees();
    });
}

/* ROLE UI */
function applyRoleUI() {
    document.getElementById("addBox").style.display =
        role === "ADMIN" ? "block" : "none";
}

/* GET */
function getEmployees() {

    token = localStorage.getItem("token");

    fetch(`${BASE_URL}/employee`, {
        headers: {
            "Authorization": "Bearer " + token
        }
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("totalEmployees").innerText = data.length;

        let html = "";

        data.forEach(emp => {
            html += `
            <div class="card">
                <div>
                    <h3>${emp.name}</h3>
                    <p>ID: ${emp.id}</p>
                    <p>Age: ${emp.age}</p>
                </div>

                <div>
                    <button class="delete-btn" onclick="deleteEmployee(${emp.id})">Delete</button>
                </div>
            </div>`;
        });

        document.getElementById("output").innerHTML = html;
    });
}

/* ADD */
function addEmployee() {

    token = localStorage.getItem("token");

    fetch(`${BASE_URL}/employee`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            name: document.getElementById("empName").value,
            age: document.getElementById("empAge").value
        })
    })
    .then(() => {
        alert("Employee Added");
        getEmployees();
    });
}

/* DELETE */
function deleteEmployee(id) {

    token = localStorage.getItem("token");

    fetch(`${BASE_URL}/employee/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + token
        }
    })
    .then(() => {
        getEmployees();
    });
}

function toggleAdd() {
    let box = document.getElementById("addBox");
    box.style.display = box.style.display === "none" ? "block" : "none";
}

</script>

</body>
</html>
